services:
  # --- Infrastructure ---
  notif-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/bastien-antigravity/notif-server:${TAG:-latest}
    container_name: notif-server
    restart: unless-stopped
    ports:
      - "127.0.0.2:${NT_PORT:-1026}:${NT_PORT:-1026}"
    networks:
      - teleremote_network
    labels: [ com.centurylinklabs.watchtower.enable=true ]

networks:
  teleremote_network:
    external: true
